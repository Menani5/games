<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Game Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Game Hub</h1>
    <p class="subtitle">Choose a game to play</p>

    <div class="game-grid">
      <a class="game-card" href="tic-tac-toe/index.html">
        <div class="game-card-icon">🎮</div>
        <div class="game-card-body">
          <h2 class="game-card-title">Tic Tac Toe</h2>
          <p class="game-card-desc">Classic X's and O's on a customizable board size. Play against a friend on one device.</p>
        </div>
        <div class="game-card-cta">Play <span class="arrow">→</span></div>
      </a>

      <a class="game-card" href="spy-game/index.html">
        <div class="game-card-icon">🕵️</div>
        <div class="game-card-body">
          <h2 class="game-card-title">Guess the Spy</h2>
          <p class="game-card-desc">Offline pass-and-play party game. Everyone gets a secret word except the spy — find them out!</p>
        </div>
        <div class="game-card-cta">Play <span class="arrow">→</span></div>
      </a>
    </div>
  </div>
</body>
</html>
