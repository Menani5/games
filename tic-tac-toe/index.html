<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <nav class="game-nav">
      <a href="../index.html">🏠 Home</a>
      <a href="index.html" class="active">🎮 Tic Tac Toe</a>
      <a href="../spy-game/index.html">🕵️ Spy Game</a>
    </nav>

    <h1>Tic Tac Toe</h1>

    <div class="settings-panel">
      <div class="setting">
        <label for="boardSize">Board Size (N &times; N)</label>
        <input type="number" id="boardSize" min="3" max="20" value="10">
      </div>
      <div class="setting">
        <label for="winLength">Win Line Length</label>
        <input type="number" id="winLength" min="3" max="20" value="5">
      </div>
      <button id="startBtn">Start Game</button>
    </div>

    <div class="status" id="status">Configure settings and press Start Game</div>
    <button id="playAgainBtn">Play Again</button>

    <div class="scoreboard">
      <div class="score x-score">
        <span class="score-label">Player X</span>
        <span class="score-value" id="scoreX">0</span>
      </div>
      <div class="score draw-score">
        <span class="score-label">Draws</span>
        <span class="score-value" id="scoreDraw">0</span>
      </div>
      <div class="score o-score">
        <span class="score-label">Player O</span>
        <span class="score-value" id="scoreO">0</span>
      </div>
    </div>

    <div class="board-wrapper">
      <div class="board" id="board"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
